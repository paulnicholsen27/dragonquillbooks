{% extends "layouts/base.html" %}

{% block head %}
    <link rel="stylesheet" href="/assets/css/blog.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "{{ title }}",
      "description": "{{ excerpt or content | striptags | slice(0, 160) }}",
      "image": "{{ client.domain }}{% getUrl image | resize({ width: 1200 }) | jpeg %}",
      "datePublished": "{{ date | isoDate }}",
      "dateModified": "{{ updatedDate | isoDate or date | isoDate }}",
      "author": {
        "@type": "Person",
        "name": "{{ author }}"
      },
      "publisher": {
        "@type": "Organization",
        "name": "{{ client.businessName or 'Santo Psychotherapy' }}",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ client.domain }}/assets/images/logos/full_logo.svg",
          "width": 210,
          "height": 29
        }
      }
    }
    </script>
{% endblock %}

{% block body %}

    <!-- ============================================ -->
    <!--                Post Content                  -->
    <!-- ============================================ -->

    <div id="single-article">
        <div class="cs-container">
            <article class="cs-article-post">
                <figure class="cs-article-figure">
                    <picture class="cs-article-image">
                        <!--Mobile Image-->
                        <source media="(max-width: 600px)" srcset="{% getUrl image | resize({ width: 576 }) | avif %}" type="image/avif">
                        <source media="(max-width: 600px)" srcset="{% getUrl image | resize({ width: 576 }) | webp %}" type="image/webp">
                        <source media="(max-width: 600px)" srcset="{% getUrl image | resize({ width: 576 }) | jpeg %}" type="image/jpeg">
                        <!--Tablet Image-->
                        <source media="(max-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600 }) | avif %}" type="image/avif">
                        <source media="(max-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600 }) | webp %}" type="image/webp">
                        <source media="(max-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600 }) | jpeg %}" type="image/jpeg">
                        <!--Desktop Image-->
                        <source media="(min-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600 }) | avif %}" type="image/avif">
                        <source media="(min-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600 }) | webp %}" type="image/webp">
                        <source media="(min-width: 1024px)" srcset="{% getUrl image | resize({ width: 1600 }) | jpeg %}" type="image/jpeg">
                        <img src="{% getUrl image | resize({ width: 1600 }) | jpeg %}" alt="{{ alt }}" width="1600" loading="lazy" decoding="async" aria-hidden="true">
                    </picture>
                    {% if imageAlt %}<figcaption>{{ imageAlt }}</figcaption>{% endif %}
                </figure>
                <div class="cs-article-group">
                    <h1 class="cs-article-title">{{ title }}</h1>
                    <div class="cs-author-group">
                        <picture class="cs-author-img">
                            {% if authorAvatar %}
                                <img src="{{ authorAvatar }}" alt="{{ author }}" width="32" height="32" decoding="async" loading="lazy" />
                            {% else %}
                                <img src="/assets/images/logos/logo_bulb_square.png" alt="Profile icon" width="32" height="32" decoding="async" loading="lazy" aria-hidden="true" />
                            {% endif %}
                        </picture>
                        <span class="cs-author-name">{{ author }}</span>
                        <span aria-hidden="true" class="cs-dot"></span>
                        <span class="cs-date">{{ date | postDate }}</span>
                    </div>
                </div>
                <section class="cs-article-content">
                    {{ content | imageTitlesToCaptions | safe }}
                </section>
            </article>
        </div>

        {% include 'components/featured-posts.html' %}
    </div>
{% endblock %}
